name: .NET 9 Selenium Tests + Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore --configuration Release

    - name: Run NUnit tests
      run: |
        dotnet test --no-build --configuration Release \
          --collect:"XPlat Code Coverage" \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./TestResults

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: NUnit-Test-Results
        path: ./TestResults

    # --- Release packaging (only on push to main) ---
    - name: Create source package for release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Package the repository source code as a zip (exclude git metadata)
        zip -r automation-source.zip . -x ".git/*" ".github/*" "**/bin/*" "**/obj/*" "**/TestResults/*"

    - name: Upload source package artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: Automation-Source
        path: automation-source.zip

    - name: Compute release tag (YYYY.MM.DD.vN)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: rel
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DATE_TAG=$(date -u +"%Y.%m.%d")
        BASE="$DATE_TAG"

        # Find existing tags for this date: YYYY.MM.DD or YYYY.MM.DD.vN
        EXISTING=$(gh release list --limit 200 --json tagName --jq ".[].tagName" | grep -E "^${BASE}(\\.v[0-9]+)?$" || true)

        if [ -z "$EXISTING" ]; then
          TAG="$BASE"
        else
          # Determine next vN
          MAX=0
          while IFS= read -r t; do
            if [[ "$t" == "$BASE" ]]; then
              n=0
            elif [[ "$t" =~ ^${BASE}\\.v([0-9]+)$ ]]; then
              n=${BASH_REMATCH[1]}
            else
              n=0
            fi
            if [ "$n" -gt "$MAX" ]; then MAX=$n; fi
          done <<< "$EXISTING"
          TAG="${BASE}.v$((MAX+1))"
        fi

        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "date=$DATE_TAG" >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release and upload package
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.rel.outputs.tag }}"

        gh release create "$TAG" \
          --title "Automation Release $TAG" \
          --notes "Automated release generated after successful test run on main." \
          automation-source.zip
